name: ngx-lottie

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - run: git fetch --no-tags --prune --depth 2 origin master

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm nx affected:lint --parallel --base=origin/master
      - run: pnpm nx affected:test --parallel --base=origin/master
      - run: pnpm nx affected:build --base=origin/master
      - run: pnpm nx affected:e2e --base=origin/master
